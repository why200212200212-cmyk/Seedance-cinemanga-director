<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">宫廷夜戏电影色卡示例</title>
  <desc id="desc">漆黑、绛紫、朱红、暗绿鳞片与烛火琥珀组成的STRICT-10色卡。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080505"/><stop offset=".5" stop-color="#120b13"/><stop offset="1" stop-color="#030607"/></linearGradient><style>.s{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif}.g{fill:#edbd78}.c{fill:#85c9d6}.w{fill:#f0efea}.m{fill:#a99ca2}.card{fill:#0b0c0e;stroke:#8d6738;stroke-width:2}.h{font-size:18px;font-weight:700}.t{font-size:16px}</style></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><path d="M28 75V28h230M1342 28h230v47M28 825v47h230M1342 872h230v-47" fill="none" stroke="#8d6738" stroke-width="2"/>
  <text x="800" y="80" text-anchor="middle" class="s g" font-size="43" font-weight="700" letter-spacing="3">PAL-VID-PALACE-01 · STRICT-10</text>
  <text x="800" y="122" text-anchor="middle" class="s c" font-size="23" letter-spacing="5">紫微宫寝殿夜戏 · 低照度烛光与巨物尺度</text>
  <text x="800" y="154" text-anchor="middle" class="s m" font-size="16">LACQUER BLACK / PALACE CRIMSON / SCALE GREEN / CANDLE AMBER</text>
  <g transform="translate(38 200)" class="s">
    <g transform="translate(0)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#1A1610"/><text x="72" y="250" text-anchor="middle" class="g h">P01 · #1A1610</text><text x="72" y="282" text-anchor="middle" class="w t">中性基底</text><text x="72" y="312" text-anchor="middle" class="m t">漆黑立柱</text></g>
    <g transform="translate(152)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#2A1828"/><text x="72" y="250" text-anchor="middle" class="g h">P02 · #2A1828</text><text x="72" y="282" text-anchor="middle" class="w t">环境基底</text><text x="72" y="312" text-anchor="middle" class="m t">深殿绛紫</text></g>
    <g transform="translate(304)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#6E2820"/><text x="72" y="250" text-anchor="middle" class="g h">P03 · #6E2820</text><text x="72" y="282" text-anchor="middle" class="w t">固有色</text><text x="72" y="312" text-anchor="middle" class="m t">宫柱朱红</text></g>
    <g transform="translate(456)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#1F2A1F"/><text x="72" y="250" text-anchor="middle" class="g h">P04 · #1F2A1F</text><text x="72" y="282" text-anchor="middle" class="w t">固有色</text><text x="72" y="312" text-anchor="middle" class="m t">巨鳞暗绿</text></g>
    <g transform="translate(608)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#2A3838"/><text x="72" y="250" text-anchor="middle" class="g h">P05 · #2A3838</text><text x="72" y="282" text-anchor="middle" class="w t">高光倾向</text><text x="72" y="312" text-anchor="middle" class="m t">鳞缘冷青</text></g>
    <g transform="translate(760)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#A56E2A"/><text x="72" y="250" text-anchor="middle" class="g h">P06 · #A56E2A</text><text x="72" y="282" text-anchor="middle" class="w t">固有色</text><text x="72" y="312" text-anchor="middle" class="m t">赭黄空袍</text></g>
    <g transform="translate(912)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#846035"/><text x="72" y="250" text-anchor="middle" class="g h">P07 · #846035</text><text x="72" y="282" text-anchor="middle" class="w t">强调色</text><text x="72" y="312" text-anchor="middle" class="m t">暗金刺绣</text></g>
    <g transform="translate(1064)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#C9763A"/><text x="72" y="250" text-anchor="middle" class="g h">P08 · #C9763A</text><text x="72" y="282" text-anchor="middle" class="w t">实用光</text><text x="72" y="312" text-anchor="middle" class="m t">烛火琥珀</text></g>
    <g transform="translate(1216)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#6E5A40"/><text x="72" y="250" text-anchor="middle" class="g h">P09 · #6E5A40</text><text x="72" y="282" text-anchor="middle" class="w t">固有色</text><text x="72" y="312" text-anchor="middle" class="m t">丝帷淡赭</text></g>
    <g transform="translate(1368)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#3A4858"/><text x="72" y="250" text-anchor="middle" class="g h">P10 · #3A4858</text><text x="72" y="282" text-anchor="middle" class="w t">阴影倾向</text><text x="72" y="312" text-anchor="middle" class="m t">夜色冷灰</text></g>
  </g>
  <g transform="translate(38 594)" class="s"><rect width="1520" height="202" rx="18" class="card"/><text x="30" y="42" class="g" font-size="22" font-weight="700">STRICT COLOR CONTRACT</text><text x="30" y="78" class="w" font-size="18">P01/P02建立近黑宫殿；P03只属于朱红立柱；P04/P05只属于巨鳞；P06/P07只属于空黄袍与刺绣。</text><text x="30" y="112" class="c" font-size="18">P08烛火从世界左侧提供低强度暖光；P10只控制远处夜色和冷阴影，不把主体染成蓝色。</text><text x="30" y="148" class="m" font-size="17">尺度与接触：巨物贴地、接触阴影连续；柱遮转场时画面与声音同步变暗、变闷。</text><text x="30" y="180" class="m" font-size="17">REFERENCE-ONLY COLOR — 禁止跨VID继承，禁止把色板版式渲染进成片。</text></g>
  <text x="800" y="846" text-anchor="middle" class="s g" font-size="18" letter-spacing="5">LOW-KEY PALACE NIGHT · PRACTICAL CANDLE · MATERIAL SEPARATION</text>
</svg>
