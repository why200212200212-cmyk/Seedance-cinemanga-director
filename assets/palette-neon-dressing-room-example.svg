<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">霓虹化妆间电影色卡示例</title>
  <desc id="desc">粉紫霓虹、冷蓝窗光、暖橘人物光与肤色保护的GUIDED-10色卡。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#090711"/><stop offset=".55" stop-color="#120816"/><stop offset="1" stop-color="#02070c"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.s{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif}.g{fill:#edbd78}.c{fill:#79d8eb}.w{fill:#eef2f3}.m{fill:#9c9aaa}.card{fill:#090d13;stroke:#9a6d3a;stroke-width:2}.h{font-size:18px;font-weight:700}.t{font-size:16px}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><circle cx="1320" cy="180" r="240" fill="#A23C8E" opacity=".12" filter="url(#glow)"/><circle cx="180" cy="720" r="230" fill="#3A88B8" opacity=".1" filter="url(#glow)"/>
  <path d="M28 75V28h230M1342 28h230v47M28 825v47h230M1342 872h230v-47" fill="none" stroke="#9a6d3a" stroke-width="2"/>
  <text x="800" y="80" text-anchor="middle" class="s g" font-size="43" font-weight="700" letter-spacing="3">PAL-VID-NEON-01 · GUIDED-10</text>
  <text x="800" y="122" text-anchor="middle" class="s c" font-size="23" letter-spacing="5">专业化妆间夜戏 · 环境光与人物光分工</text>
  <text x="800" y="154" text-anchor="middle" class="s m" font-size="16">MAGENTA AMBIENCE / COOL WINDOW RIM / WARM TUNGSTEN FACE KEY</text>
  <g transform="translate(38 200)" class="s">
    <g transform="translate(0)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#1A1610"/><text x="72" y="250" text-anchor="middle" class="g h">P01 · #1A1610</text><text x="72" y="282" text-anchor="middle" class="w t">中性基底</text><text x="72" y="312" text-anchor="middle" class="m t">深部黑位</text></g>
    <g transform="translate(152)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#2A1828"/><text x="72" y="250" text-anchor="middle" class="g h">P02 · #2A1828</text><text x="72" y="282" text-anchor="middle" class="w t">环境基底</text><text x="72" y="312" text-anchor="middle" class="m t">深殿绛紫</text></g>
    <g transform="translate(304)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#6E2820"/><text x="72" y="250" text-anchor="middle" class="g h">P03 · #6E2820</text><text x="72" y="282" text-anchor="middle" class="w t">强调色</text><text x="72" y="312" text-anchor="middle" class="m t">深红背景</text></g>
    <g transform="translate(456)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#A23C8E"/><text x="72" y="250" text-anchor="middle" class="g h">P04 · #A23C8E</text><text x="72" y="282" text-anchor="middle" class="w t">实用光</text><text x="72" y="312" text-anchor="middle" class="m t">粉紫霓虹</text></g>
    <g transform="translate(608)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#D06BB8"/><text x="72" y="250" text-anchor="middle" class="g h">P05 · #D06BB8</text><text x="72" y="282" text-anchor="middle" class="w t">高光倾向</text><text x="72" y="312" text-anchor="middle" class="m t">霓虹反射</text></g>
    <g transform="translate(760)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#3A88B8"/><text x="72" y="250" text-anchor="middle" class="g h">P06 · #3A88B8</text><text x="72" y="282" text-anchor="middle" class="w t">自然光</text><text x="72" y="312" text-anchor="middle" class="m t">冷蓝窗光</text></g>
    <g transform="translate(912)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#B8C4D4"/><text x="72" y="250" text-anchor="middle" class="g h">P07 · #B8C4D4</text><text x="72" y="282" text-anchor="middle" class="w t">环境反射</text><text x="72" y="312" text-anchor="middle" class="m t">冷雾高光</text></g>
    <g transform="translate(1064)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#C9763A"/><text x="72" y="250" text-anchor="middle" class="g h">P08 · #C9763A</text><text x="72" y="282" text-anchor="middle" class="w t">实用光</text><text x="72" y="312" text-anchor="middle" class="m t">钨丝人物光</text></g>
    <g transform="translate(1216)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#A86A4A"/><text x="72" y="250" text-anchor="middle" class="g h">P09 · #A86A4A</text><text x="72" y="282" text-anchor="middle" class="w t">肤色阴影</text><text x="72" y="312" text-anchor="middle" class="m t">暖肤暗部</text></g>
    <g transform="translate(1368)"><rect width="144" height="355" rx="12" class="card"/><rect x="9" y="9" width="126" height="210" rx="7" fill="#D7B49E"/><text x="72" y="250" text-anchor="middle" class="g h">P10 · #D7B49E</text><text x="72" y="282" text-anchor="middle" class="w t">肤色高光</text><text x="72" y="312" text-anchor="middle" class="m t">面部可读</text></g>
  </g>
  <g transform="translate(38 594)" class="s"><rect width="1520" height="202" rx="18" class="card"/><text x="30" y="42" class="g" font-size="22" font-weight="700">LIGHT AND COLOR CONTRACT</text><text x="30" y="78" class="w" font-size="18">环境：P04粉紫霓虹为主，P06冷蓝窗光分离轮廓，P03深红只作背景强调；人物：P08钨丝光保证面部与口型。</text><text x="30" y="112" class="c" font-size="18">肤色保护：P09/P10保留皮肤明暗与微纹理，不用粉紫综合色覆盖五官；背景与人物保持层次。</text><text x="30" y="148" class="m" font-size="17">GUIDED：允许同一色相家族随曝光、雾、镜面反射与35mm胶片响应变化；不形成新的视觉主色。</text><text x="30" y="180" class="m" font-size="17">REFERENCE-ONLY COLOR — 不渲染色块、P编号、HEX、标题或版式。</text></g>
  <text x="800" y="846" text-anchor="middle" class="s g" font-size="18" letter-spacing="5">ENVIRONMENT LIGHT · PERSON LIGHT · SKIN PROTECTION</text>
</svg>
