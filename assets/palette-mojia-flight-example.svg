<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">墨家云海飞行电影色卡示例</title>
  <desc id="desc">云白、暮蓝、朝晖、古木、青铜、黑衣与深蓝邀请函组成的STRICT-12色卡。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07131b"/><stop offset=".58" stop-color="#0a0d11"/><stop offset="1" stop-color="#020305"/></linearGradient><style>.s{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif}.g{fill:#edbd78}.c{fill:#8fd5e2}.w{fill:#f1f2ef}.m{fill:#9aa7b0}.card{fill:#091018;stroke:#8d6738;stroke-width:2}.h{font-size:17px;font-weight:700}.t{font-size:15px}</style></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><path d="M28 75V28h230M1342 28h230v47M28 825v47h230M1342 872h230v-47" fill="none" stroke="#8d6738" stroke-width="2"/>
  <text x="800" y="80" text-anchor="middle" class="s g" font-size="43" font-weight="700" letter-spacing="3">PAL-VID-MOJIA-01 · STRICT-12</text>
  <text x="800" y="122" text-anchor="middle" class="s c" font-size="23" letter-spacing="5">云海机关飞行 · 朝晖冷影与古代材质</text>
  <text x="800" y="154" text-anchor="middle" class="s m" font-size="16">CLOUD WHITES / DAWN ORANGE / ANCIENT WOOD / BRONZE / DEEP-BLUE INVITATION</text>
  <g transform="translate(40 200)" class="s">
    <g transform="translate(0)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#E8E8DC"/><text x="60" y="248" text-anchor="middle" class="g h">P01 #E8E8DC</text><text x="60" y="280" text-anchor="middle" class="w t">高光倾向</text><text x="60" y="310" text-anchor="middle" class="m t">云层亮面</text></g>
    <g transform="translate(128)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#F0EBE0"/><text x="60" y="248" text-anchor="middle" class="g h">P02 #F0EBE0</text><text x="60" y="280" text-anchor="middle" class="w t">环境基底</text><text x="60" y="310" text-anchor="middle" class="m t">云海主色</text></g>
    <g transform="translate(256)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#B8C4D4"/><text x="60" y="248" text-anchor="middle" class="g h">P03 #B8C4D4</text><text x="60" y="280" text-anchor="middle" class="w t">阴影倾向</text><text x="60" y="310" text-anchor="middle" class="m t">暮蓝云影</text></g>
    <g transform="translate(384)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#D4884A"/><text x="60" y="248" text-anchor="middle" class="g h">P04 #D4884A</text><text x="60" y="280" text-anchor="middle" class="w t">自然光</text><text x="60" y="310" text-anchor="middle" class="m t">朝晖橙</text></g>
    <g transform="translate(512)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#E8A878"/><text x="60" y="248" text-anchor="middle" class="g h">P05 #E8A878</text><text x="60" y="280" text-anchor="middle" class="w t">高光倾向</text><text x="60" y="310" text-anchor="middle" class="m t">粉霞边缘</text></g>
    <g transform="translate(640)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#6E4A28"/><text x="60" y="248" text-anchor="middle" class="g h">P06 #6E4A28</text><text x="60" y="280" text-anchor="middle" class="w t">固有色</text><text x="60" y="310" text-anchor="middle" class="m t">古木机身</text></g>
    <g transform="translate(768)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#8E6B3A"/><text x="60" y="248" text-anchor="middle" class="g h">P07 #8E6B3A</text><text x="60" y="280" text-anchor="middle" class="w t">固有色</text><text x="60" y="310" text-anchor="middle" class="m t">青铜齿轮</text></g>
    <g transform="translate(896)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#4A4438"/><text x="60" y="248" text-anchor="middle" class="g h">P08 #4A4438</text><text x="60" y="280" text-anchor="middle" class="w t">固有色</text><text x="60" y="310" text-anchor="middle" class="m t">金属节点</text></g>
    <g transform="translate(1024)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#4A5258"/><text x="60" y="248" text-anchor="middle" class="g h">P09 #4A5258</text><text x="60" y="280" text-anchor="middle" class="w t">固有色</text><text x="60" y="310" text-anchor="middle" class="m t">青灰内衫</text></g>
    <g transform="translate(1152)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#2A2A2A"/><text x="60" y="248" text-anchor="middle" class="g h">P10 #2A2A2A</text><text x="60" y="280" text-anchor="middle" class="w t">固有色</text><text x="60" y="310" text-anchor="middle" class="m t">黑色外袍</text></g>
    <g transform="translate(1280)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#C9A050"/><text x="60" y="248" text-anchor="middle" class="g h">P11 #C9A050</text><text x="60" y="280" text-anchor="middle" class="w t">强调色</text><text x="60" y="310" text-anchor="middle" class="m t">卡片金纹</text></g>
    <g transform="translate(1408)"><rect width="120" height="355" rx="11" class="card"/><rect x="8" y="8" width="104" height="210" rx="7" fill="#1F2840"/><text x="60" y="248" text-anchor="middle" class="g h">P12 #1F2840</text><text x="60" y="280" text-anchor="middle" class="w t">固有色</text><text x="60" y="310" text-anchor="middle" class="m t">深蓝邀请函</text></g>
  </g>
  <g transform="translate(40 594)" class="s"><rect width="1520" height="202" rx="18" class="card"/><text x="30" y="42" class="g" font-size="22" font-weight="700">COLOR AND CONTINUITY CONTRACT</text><text x="30" y="78" class="w" font-size="18">云海P01–P03与朝晖P04/P05建立开场近白；古木P06、青铜P07和金属P08锁定飞行器材质。</text><text x="30" y="112" class="c" font-size="18">人物P09/P10不漂色；邀请函必须保持P12深蓝底与P11金纹，并在末秒遮镜形成近黑尾帧。</text><text x="30" y="148" class="m" font-size="17">镜头绕行时世界光源不随屏幕翻转；同一物体仅允许受朝晖、云影、曝光和空气透视影响。</text><text x="30" y="180" class="m" font-size="17">REFERENCE-ONLY COLOR — 色卡不替代角色、飞行器、邀请函或尾帧参考。</text></g>
  <text x="800" y="846" text-anchor="middle" class="s g" font-size="18" letter-spacing="5">CLOUD WHITE · DAWN LIGHT · ANCIENT MATERIAL · PROP CONTINUITY</text>
</svg>
