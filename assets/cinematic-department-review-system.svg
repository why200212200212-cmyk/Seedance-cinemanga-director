<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">九部门导演会审与电影级提示词编译</title>
  <desc id="desc">九个影视部门共享同一镜头事实，经冲突闸门编译为Seedance可执行视频提示词。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131d"/>
      <stop offset="0.55" stop-color="#02080d"/>
      <stop offset="1" stop-color="#000203"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#846035"/>
      <stop offset="0.5" stop-color="#f0c47c"/>
      <stop offset="1" stop-color="#846035"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c6076"/>
      <stop offset="1" stop-color="#4fc3d9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#244454" stroke-opacity=".16" stroke-width="1"/>
    </pattern>
    <style>
      .sans{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif}
      .serif{font-family:Georgia,"Times New Roman",serif}
      .gold{fill:#e7bd78}.cyan{fill:#79d8eb}.muted{fill:#8da5b2}.white{fill:#eef4f6}
      .card{fill:#071018;stroke:#8e6b3a;stroke-width:2}.line{stroke:#8e6b3a;stroke-width:2;fill:none}
      .small{font-size:18px;letter-spacing:1px}.tiny{font-size:15px;letter-spacing:.7px}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M30 75V28H240M1360 28H1570V75M30 825V872H240M1360 872H1570V825" class="line"/>
  <line x1="270" y1="54" x2="1330" y2="54" stroke="url(#gold)" stroke-width="2"/>

  <text x="800" y="92" text-anchor="middle" class="serif gold" font-size="46" font-weight="700" letter-spacing="5">CINEMATIC PROMPT COMPILER</text>
  <text x="800" y="130" text-anchor="middle" class="sans cyan" font-size="24" letter-spacing="8">九部门导演会审 · 电影质感 · 人物生命感</text>

  <g transform="translate(70 170)">
    <rect width="1460" height="104" rx="18" class="card"/>
    <rect x="16" y="16" width="254" height="72" rx="12" fill="#0c1d29" stroke="#4fc3d9"/>
    <text x="143" y="46" text-anchor="middle" class="sans cyan small" font-weight="700">ONE SHOT TRUTH</text>
    <text x="143" y="72" text-anchor="middle" class="sans muted tiny">唯一镜头事实</text>
    <g class="sans" font-size="18">
      <text x="310" y="43" class="gold">VID / SHOT / TIME</text>
      <text x="575" y="43" class="gold">CHAR / LOOK / PERF</text>
      <text x="895" y="43" class="gold">CAM / LGT / PAL</text>
      <text x="1168" y="43" class="gold">AUD / VOICE / STYLE</text>
      <text x="310" y="73" class="muted">时间与剧情目标</text>
      <text x="575" y="73" class="muted">身份、妆造、表演因果</text>
      <text x="895" y="73" class="muted">摄影、世界光源、色卡</text>
      <text x="1168" y="73" class="muted">声源、音色、风格作用域</text>
    </g>
  </g>

  <g transform="translate(70 310)">
    <g transform="translate(0 0)">
      <rect width="450" height="120" rx="14" class="card"/>
      <circle cx="58" cy="60" r="31" fill="none" stroke="#4fc3d9" stroke-width="3"/>
      <path d="M43 61l11 11 22-27" fill="none" stroke="#4fc3d9" stroke-width="4"/>
      <text x="110" y="46" class="sans gold" font-size="22" font-weight="700">01 DIRECTOR / PERF</text>
      <text x="110" y="75" class="sans white small">目标 · 阻碍 · 潜台词 · 注意力</text>
      <text x="110" y="101" class="sans muted tiny">刺激 → 感知 → 决定 → 反应</text>
    </g>
    <g transform="translate(505 0)">
      <rect width="450" height="120" rx="14" class="card"/>
      <path d="M29 82L58 35l29 47z" fill="none" stroke="#4fc3d9" stroke-width="3"/>
      <circle cx="58" cy="63" r="10" fill="#4fc3d9"/>
      <text x="110" y="46" class="sans gold" font-size="22" font-weight="700">02 VISUAL CONSTRUCTION</text>
      <text x="110" y="75" class="sans white small">前中后景 · 尺度 · 材质 · 遮挡</text>
      <text x="110" y="101" class="sans muted tiny">世界 / 摄影机 / 屏幕坐标分离</text>
    </g>
    <g transform="translate(1010 0)">
      <rect width="450" height="120" rx="14" class="card"/>
      <rect x="30" y="40" width="56" height="40" rx="7" fill="none" stroke="#4fc3d9" stroke-width="3"/>
      <circle cx="58" cy="60" r="13" fill="none" stroke="#4fc3d9" stroke-width="3"/>
      <path d="M86 50l22-12v44L86 70" fill="none" stroke="#4fc3d9" stroke-width="3"/>
      <text x="122" y="46" class="sans gold" font-size="22" font-weight="700">03 CINEMATOGRAPHY</text>
      <text x="122" y="75" class="sans white small">投影 · 焦段 · 景深 · CAM路径</text>
      <text x="122" y="101" class="sans muted tiny">有动机的起点、速度与停止构图</text>
    </g>

    <g transform="translate(0 146)">
      <rect width="450" height="120" rx="14" class="card"/>
      <circle cx="58" cy="60" r="18" fill="none" stroke="#f0c47c" stroke-width="3"/>
      <g stroke="#f0c47c" stroke-width="3"><line x1="58" y1="26" x2="58" y2="14"/><line x1="58" y1="106" x2="58" y2="94"/><line x1="24" y1="60" x2="12" y2="60"/><line x1="104" y1="60" x2="92" y2="60"/></g>
      <text x="110" y="46" class="sans gold" font-size="22" font-weight="700">04 LIGHTING</text>
      <text x="110" y="75" class="sans white small">环境光 · 人物光 · 光源依据</text>
      <text x="110" y="101" class="sans muted tiny">面部、眼睛、材质与阴影可读</text>
    </g>
    <g transform="translate(505 146)">
      <rect width="450" height="120" rx="14" class="card"/>
      <rect x="28" y="37" width="18" height="46" fill="#4fc3d9"/><rect x="50" y="37" width="18" height="46" fill="#846035"/><rect x="72" y="37" width="18" height="46" fill="#6b2419"/>
      <text x="110" y="46" class="sans gold" font-size="22" font-weight="700">05 COLOR GRADING</text>
      <text x="110" y="75" class="sans white small">PAL / GRADE · HEX职能 · 占比</text>
      <text x="110" y="101" class="sans muted tiny">肤色保护与STRICT-N边界</text>
    </g>
    <g transform="translate(1010 146)">
      <rect width="450" height="120" rx="14" class="card"/>
      <path d="M58 29c19 0 31 13 31 31S77 93 58 93 27 80 27 60s12-31 31-31z" fill="none" stroke="#f0c47c" stroke-width="3"/>
      <path d="M43 59q15 11 30 0M47 47h7M63 47h7" fill="none" stroke="#f0c47c" stroke-width="3"/>
      <text x="110" y="46" class="sans gold" font-size="22" font-weight="700">06 MAKEUP</text>
      <text x="110" y="75" class="sans white small">肤质 · 面部标记 · 汗尘伤妆</text>
      <text x="110" y="101" class="sans muted tiny">彩色光下仍保持身份与口型</text>
    </g>

    <g transform="translate(0 292)">
      <rect width="450" height="120" rx="14" class="card"/>
      <path d="M32 48l26-18 26 18-8 47H40z" fill="none" stroke="#4fc3d9" stroke-width="3"/>
      <text x="110" y="46" class="sans gold" font-size="22" font-weight="700">07 CHARACTER STYLING</text>
      <text x="110" y="75" class="sans white small">发型 · 服装层 · 配饰 · 材质</text>
      <text x="110" y="101" class="sans muted tiny">LOOK-ID与动作中连续性</text>
    </g>
    <g transform="translate(505 292)">
      <rect width="450" height="120" rx="14" class="card"/>
      <path d="M24 60h10l8-24 12 50 11-39 9 24 8-11h14" fill="none" stroke="#4fc3d9" stroke-width="3"/>
      <text x="110" y="46" class="sans gold" font-size="22" font-weight="700">08 SOUND DESIGN</text>
      <text x="110" y="75" class="sans white small">声源 · 同步 · 距离 · 遮挡</text>
      <text x="110" y="101" class="sans muted tiny">对白 / 拟音 / 环境 / BGM分轨</text>
    </g>
    <g transform="translate(1010 292)">
      <rect width="450" height="120" rx="14" class="card"/>
      <g stroke="#f0c47c" stroke-width="3"><line x1="30" y1="39" x2="92" y2="39"/><line x1="30" y1="61" x2="92" y2="61"/><line x1="30" y1="83" x2="92" y2="83"/><circle cx="51" cy="39" r="6" fill="#071018"/><circle cx="75" cy="61" r="6" fill="#071018"/><circle cx="43" cy="83" r="6" fill="#071018"/></g>
      <text x="110" y="46" class="sans gold" font-size="22" font-weight="700">09 MIXING</text>
      <text x="110" y="75" class="sans white small">优先级 · Ducking · 动态 · 余韵</text>
      <text x="110" y="101" class="sans muted tiny">让对白、动作与空间同时清楚</text>
    </g>
  </g>

  <g transform="translate(70 760)">
    <rect width="1460" height="92" rx="18" fill="#081722" stroke="#4fc3d9" stroke-width="2" filter="url(#glow)"/>
    <g class="sans" font-size="19" font-weight="700">
      <text x="102" y="39" class="gold">FACT LOCK</text><text x="102" y="67" class="muted tiny">锁定事实</text>
      <text x="413" y="39" class="gold">9 CONFLICT GATES</text><text x="413" y="67" class="muted tiny">PASS / RESOLVE / ASK</text>
      <text x="785" y="39" class="gold">PROMPT OPTIMIZE</text><text x="785" y="67" class="muted tiny">去重 · 解冲突 · 时间编译</text>
      <text x="1155" y="39" class="cyan">EXECUTABLE VIDEO PROMPT</text><text x="1155" y="67" class="muted tiny">Seedance / API / 其他生成端</text>
    </g>
    <g fill="none" stroke="#f0c47c" stroke-width="3"><path d="M260 47h108l-15-10m15 10-15 10"/><path d="M637 47h103l-15-10m15 10-15 10"/><path d="M1015 47h95l-15-10m15 10-15 10"/></g>
  </g>
</svg>
