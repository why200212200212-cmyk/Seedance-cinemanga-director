    <g transform="translate(840)"><rect width="112" height="330" rx="10" class="card"/><rect x="8" y="8" width="96" height="188" rx="6" fill="#4FC3D9"/><text x="56" y="224" text-anchor="middle" class="gold hex">P08</text><text x="56" y="248" text-anchor="middle" class="white hex">#4FC3D9</text><text x="56" y="276" text-anchor="middle" class="muted label">自发光</text><text x="56" y="300" text-anchor="middle" class="muted label">机关关节</text></g>
