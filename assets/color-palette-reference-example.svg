    <g transform="translate(1200)"><rect width="112" height="330" rx="10" class="card"/><rect x="8" y="8" width="96" height="188" rx="6" fill="#5C2030"/><text x="56" y="224" text-anchor="middle" class="gold hex">P11</text><text x="56" y="248" text-anchor="middle" class="white hex">#5C2030</text><text x="56" y="276" text-anchor="middle" class="muted label">固有色</text><text x="56" y="300" text-anchor="middle" class="muted label">贵族酒红</text></g>
    <g transform="translate(1320)"><rect width="112" height="330" rx="10" class="card"/><rect x="8" y="8" width="96" height="188" rx="6" fill="#C9B896"/><text x="56" y="224" text-anchor="middle" class="gold hex">P12</text><text x="56" y="248" text-anchor="middle" class="white hex">#C9B896</text><text x="56" y="276" text-anchor="middle" class="muted label">固有色</text><text x="56" y="300" text-anchor="middle" class="muted label">奶油布料</text></g>
    <g transform="translate(1440)"><rect width="112" height="330" rx="10" class="card"/><rect x="8" y="8" width="96" height="188" rx="6" fill="#A86A4A"/><text x="56" y="224" text-anchor="middle" class="gold hex">P13</text><text x="56" y="248" text-anchor="middle" class="white hex">#A86A4A</text><text x="56" y="276" text-anchor="middle" class="muted label">高光倾向</text><text x="56" y="300" text-anchor="middle" class="muted label">日晒铜肤</text></g>
  </g>

  <g transform="translate(42 558)" class="sans">
    <rect width="1516" height="232" rx="18" class="card"/>
    <text x="32" y="42" class="gold" font-size="22" font-weight="700">VIDEO PROMPT BINDING / 视频提示词引用</text>
    <text x="32" y="78" class="white" font-size="18">图片N（PAL-VID-DEMO-01，REFERENCE-ONLY COLOR）：只参考P01–P13的色彩分工、相对占比与调色方向。</text>
    <text x="32" y="110" class="cyan" font-size="18">P01 #F0B670 → 金色直射光　　P03 #4A5870 → 冷蓝阴影　　P06 #7A6845 → 青铜机件　　P08 #4FC3D9 → 机关自发光</text>
    <text x="32" y="146" class="muted" font-size="17">允许：曝光、阴影、雾、反射与胶片响应造成合理明度/饱和度变化。</text>
    <text x="32" y="178" class="muted" font-size="17">禁止：引入色卡外有意设计色相；把色块、P编号、HEX、边框、白底或版式渲染进成片。</text>
    <rect x="1135" y="162" width="341" height="46" rx="23" fill="#0b2a35" stroke="#4fc3d9"/>
    <text x="1305" y="192" text-anchor="middle" class="cyan" font-size="17" font-weight="700">STRUCTURED PAL TABLE = SOURCE OF TRUTH</text>
  </g>
  <text x="800" y="840" text-anchor="middle" class="sans gold" font-size="18" letter-spacing="5">GENERATE · LABEL · VALIDATE · REFERENCE</text>
