    <g transform="translate(600)"><rect width="112" height="330" rx="10" class="card"/><rect x="8" y="8" width="96" height="188" rx="6" fill="#7A6845"/><text x="56" y="224" text-anchor="middle" class="gold hex">P06</text><text x="56" y="248" text-anchor="middle" class="white hex">#7A6845</text><text x="56" y="276" text-anchor="middle" class="muted label">固有色</text><text x="56" y="300" text-anchor="middle" class="muted label">青铜机件</text></g>
