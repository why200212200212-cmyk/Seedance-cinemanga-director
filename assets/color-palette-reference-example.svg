    <g transform="translate(0)"><rect width="112" height="330" rx="10" class="card"/><rect x="8" y="8" width="96" height="188" rx="6" fill="#F0B670"/><text x="56" y="224" text-anchor="middle" class="gold hex">P01</text><text x="56" y="248" text-anchor="middle" class="white hex">#F0B670</text><text x="56" y="276" text-anchor="middle" class="muted label">自然光</text><text x="56" y="300" text-anchor="middle" class="muted label">金色直射</text></g>
    <g transform="translate(120)"><rect width="112" height="330" rx="10" class="card"/><rect x="8" y="8" width="96" height="188" rx="6" fill="#C8581F"/><text x="56" y="224" text-anchor="middle" class="gold hex">P02</text><text x="56" y="248" text-anchor="middle" class="white hex">#C8581F</text><text x="56" y="276" text-anchor="middle" class="muted label">环境色</text><text x="56" y="300" text-anchor="middle" class="muted label">落日天空</text></g>
    <g transform="translate(240)"><rect width="112" height="330" rx="10" class="card"/><rect x="8" y="8" width="96" height="188" rx="6" fill="#4A5870"/><text x="56" y="224" text-anchor="middle" class="gold hex">P03</text><text x="56" y="248" text-anchor="middle" class="white hex">#4A5870</text><text x="56" y="276" text-anchor="middle" class="muted label">阴影倾向</text><text x="56" y="300" text-anchor="middle" class="muted label">冷蓝阴影</text></g>
