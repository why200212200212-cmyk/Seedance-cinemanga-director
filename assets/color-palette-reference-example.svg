<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">STRICT-13电影色卡生成与视频引用示例</title>
  <desc id="desc">展示十三个带P编号、HEX、职能和绑定对象的色卡，以及REFERENCE-ONLY COLOR引用规则。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07131d"/><stop offset="1" stop-color="#010304"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#27414d" stroke-opacity=".16"/></pattern>
    <style>
      .sans{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif}.serif{font-family:Georgia,"Times New Roman",serif}
      .gold{fill:#edc47f}.cyan{fill:#79d8eb}.white{fill:#eef3f4}.muted{fill:#8ca0aa}
      .label{font-size:15px}.hex{font-size:16px;font-weight:700;letter-spacing:.5px}.card{fill:#081018;stroke:#8e6b3a;stroke-width:2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M28 72V28H245M1355 28h217v44M28 828v44h217M1355 872h217v-44" fill="none" stroke="#8e6b3a" stroke-width="2"/>
  <text x="800" y="76" text-anchor="middle" class="serif gold" font-size="46" font-weight="700" letter-spacing="4">PAL-VID-DEMO-01 · STRICT-13</text>
  <text x="800" y="116" text-anchor="middle" class="sans cyan" font-size="23" letter-spacing="6">色卡生成 · 精确标注 · 视频提示词引用</text>
  <text x="800" y="148" text-anchor="middle" class="sans muted" font-size="16">GOLDEN HOUR DECK · GRADE-FILM-01 · REFERENCE-ONLY COLOR</text>

